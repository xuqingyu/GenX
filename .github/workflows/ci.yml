name: CI

on: 
  pull_request:
  push:
    branches: [main, develop]
    tags: ['*']
    
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name}}
    runs-on: ${{ matrix.os }}
    strategy: 
      fail-fast: false
      matrix:
        version:
          - "1.6"
          - "1.9" 
          - "1.10"  # LTS
          - '1'     # latest stable
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          - version: '1'
            os: windows-latest
            arch: x64

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2

      # NearestNeighbors 0.4.24 uses Base.Returns, which is unavailable on Julia 1.6.
      # Keep this workaround local to the Julia 1.6 CI job so newer Julia versions
      # can continue resolving newer compatible releases.
      - name: Pin NearestNeighbors for Julia 1.6
        if: matrix.version == '1.6'
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.add(PackageSpec(name="NearestNeighbors", version=v"0.4.22"))
            Pkg.pin(PackageSpec(name="NearestNeighbors", version=v"0.4.22"))
          '

      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-runtest@latest
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v3
        with:
          file: lcov.info
